<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHER</title>


    <link rel="stylesheet" href="style.css">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    


</head>
<body>

    <div class="container">

        <div class="weather-card">

            <h2 class="sun">  ⛅ Mausam Khabar</h2>

            <div class="search">

                <input type="text" id="city" placeholder="Enter city name">

             <button class="search-icon" onclick="getWeather()">


    <i class="fa-solid fa-magnifying-glass"></i>
    
</button>


            </div>

            <div class="box">

               <h1 id="cityName">City</h1>

                <p id="day"> 📅 Day</p>

              <p id="dateTime"> Date | Time</p>

                <h2 id="temp"> -- °C </h2>

                <p id="condition">Condition</p>

                </div>

                <div class="inner">

                    <div class="humidity">

                        <span>  💧Humidity</span>

                        <p id="humidity">-- %</p>

                        </div>

                        <div class="wind">

                        <span>  🌬 Wind</span>

                        <p id="wind">-- km/h </p>

                    </div>

                </div>

        </div>

    </div>

    <script src="script.js"></script>
    
</body>
</html>
